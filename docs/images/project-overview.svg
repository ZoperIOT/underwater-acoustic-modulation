<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc">
  <title id="title">Underwater acoustic modulation signal chain</title>
  <desc id="desc">A six-stage signal chain: bits, modulation, pulse shaping, carrier modulation, WAV output, and acoustic experiment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#061b34"/><stop offset="1" stop-color="#0b4163"/></linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#00111f" flood-opacity=".32"/></filter>
    <style>.label{font:700 22px Arial,sans-serif;fill:#effbff}.detail{font:400 15px Arial,sans-serif;fill:#a9d7e9}.number{font:700 15px Arial,sans-serif;fill:#062238}.arrow{stroke:#5bcee8;stroke-width:3;stroke-linecap:round}.icon{fill:#5bcee8}.stage{fill:#103b58;stroke:#2a7799;stroke-width:1.5}</style>
  </defs>
  <rect width="1440" height="420" fill="url(#bg)" rx="28"/>
  <text x="720" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="30" fill="#fff">Underwater Acoustic Transmit Signal Chain</text>
  <text x="720" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" fill="#a9d7e9">From information bits to a playback-ready waveform for acoustic experiments</text>
  <g filter="url(#shadow)">
    <g transform="translate(55 155)"><rect class="stage" width="190" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">1</text><text class="label" x="22" y="83">Bits</text><text class="detail" x="22" y="111">Payload / test data</text><text class="detail" x="22" y="132">0 · 1 · 1 · 0 · …</text></g>
    <g transform="translate(293 155)"><rect class="stage" width="190" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">2</text><text class="label" x="22" y="83">Modulation</text><text class="detail" x="22" y="111">BPSK · QPSK · QAM</text><text class="detail" x="22" y="132">8PSK · DSSS · OFDM</text></g>
    <g transform="translate(531 155)"><rect class="stage" width="190" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">3</text><text class="label" x="22" y="83">Pulse shaping</text><text class="detail" x="22" y="111">Root-raised cosine</text><text class="detail" x="22" y="132">Baseband waveform</text></g>
    <g transform="translate(769 155)"><rect class="stage" width="190" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">4</text><text class="label" x="22" y="83">Carrier</text><text class="label" x="22" y="108">modulation</text><text class="detail" x="22" y="133">Acoustic passband</text></g>
    <g transform="translate(1007 155)"><rect class="stage" width="190" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">5</text><text class="label" x="22" y="83">WAV output</text><text class="detail" x="22" y="111">96 kHz floating-point</text><text class="detail" x="22" y="132">Playback-ready signal</text></g>
    <g transform="translate(1245 155)"><rect class="stage" width="140" height="150" rx="18"/><circle class="icon" cx="32" cy="31" r="17"/><text class="number" x="32" y="36" text-anchor="middle">6</text><text class="label" x="22" y="83">Acoustic</text><text class="label" x="22" y="108">experiment</text><text class="detail" x="22" y="133">DAC → transducer</text></g>
  </g>
  <g class="arrow"><path d="M251 230h31"/><path d="M275 223l8 7-8 7"/><path d="M489 230h31"/><path d="M513 223l8 7-8 7"/><path d="M727 230h31"/><path d="M751 223l8 7-8 7"/><path d="M965 230h31"/><path d="M989 223l8 7-8 7"/><path d="M1203 230h31"/><path d="M1227 223l8 7-8 7"/></g>
</svg>
